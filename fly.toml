app = 'django-demo-by-wholeshoot'
primary_region = 'iad'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[[statics]]
  guest_path = '/code/demo/staticfiles'
  url_prefix = '/static/'
